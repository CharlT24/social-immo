{% extends 'base.html' %}

{% block title %}Deconnexion - Social Immo{% endblock %}

{% block content %}
<div class="min-h-[85vh] flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-md">

        <div class="bg-white rounded-3xl shadow-apple p-10 text-center">

            <!-- Icon -->
            <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
            </div>

            <!-- Header -->
            <h1 class="text-2xl font-semibold tracking-tight mb-2">Se deconnecter ?</h1>
            <p class="text-apple-gray mb-8">Vous etes sur le point de quitter votre session.</p>

            <!-- Form -->
            <form method="post" action="{% url 'account_logout' %}">
                {% csrf_token %}

                <button type="submit"
                        class="w-full bg-red-500 text-white font-semibold py-4 px-6 rounded-xl hover:bg-red-600 active:scale-[0.98] transition-all shadow-lg shadow-red-500/25 mb-4">
                    Oui, me deconnecter
                </button>
            </form>

            <a href="{% url 'listings:homepage' %}"
               class="inline-flex items-center justify-center w-full py-4 px-6 rounded-xl text-apple-text font-medium bg-apple-bg hover:bg-gray-200 transition-all">
                Annuler
            </a>

            <!-- Info -->
            <p class="text-xs text-apple-gray mt-6">
                Vous pourrez vous reconnecter a tout moment.
            </p>

        </div>

    </div>
</div>
{% endblock %}
